<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>L2E Match | AI Job Matching Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Sarabun', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f1f3d 0%, #065f46 40%, #10b981 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
        }

        .card-header-section {
            background: linear-gradient(135deg, #0f1f3d, #10b981);
            padding: 36px 32px 28px;
            text-align: center;
            position: relative;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: #fbbf24;
        }

        .tagline {
            color: rgba(255, 255, 255, .8);
            font-size: .9rem;
            font-weight: 500;
            margin-top: 6px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 18px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .num {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .stat-item .lbl {
            font-size: .7rem;
            color: rgba(255, 255, 255, .65);
            font-weight: 600;
        }

        .card-body-section {
            padding: 28px 32px 32px;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            font-weight: 700;
            font-size: .9rem;
            color: #64748b;
            background: transparent;
            transition: .2s;
            cursor: pointer;
        }

        .role-btn.active {
            background: #fff;
            color: #10b981;
            box-shadow: 0 2px 8px rgba(10, 102, 194, .15);
        }

        .role-btn.active.employer {
            color: #16a34a;
        }

        .form-label-sm {
            font-size: .82rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: .98rem;
            font-family: 'Sarabun', sans-serif;
            outline: none;
            transition: .15s;
            background: #f8faff;
        }

        .form-input:focus {
            border-color: #10b981;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(10, 102, 194, .12);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.05rem;
            transition: .2s;
            margin-top: 18px;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(10, 102, 194, .40);
        }

        .btn-login.employer {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        .btn-login.employer:hover {
            box-shadow: 0 8px 24px rgba(22, 163, 74, .40);
        }

        .hint-bar {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 14px;
        }

        .hint-title {
            font-size: .75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px;
        }

        .hint-pill {
            background: #fff;
            border: 1.5px solid #c7d2fe;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: .76rem;
            font-weight: 700;
            color: #10b981;
            cursor: pointer;
            transition: .15s;
            display: inline-block;
            margin: 2px;
        }

        .hint-pill:hover {
            background: #e8f0fe;
            border-color: #10b981;
        }

        .hint-pill.employer {
            color: #16a34a;
            border-color: #bbf7d0;
        }

        .hint-pill.employer:hover {
            background: #f0fdf4;
            border-color: #16a34a;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .85rem;
            font-weight: 600;
            margin-top: 12px;
            display: none;
        }

        .loading-state {
            display: none;
            text-align: center;
            padding: 8px 0;
        }

        .spinner-sm {
            width: 20px;
            height: 20px;
            border: 2.5px solid #e2e8f0;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .market-link {
            text-align: center;
            margin-top: 14px;
            font-size: .82rem;
            color: #64748b;
        }

        .market-link a {
            color: #10b981;
            font-weight: 700;
            text-decoration: none;
        }

        .market-link a:hover {
            text-decoration: underline;
        }
    </style>

    <style>
        /* Bootstrap Primary Override to Emerald Green */
        :root {
            --bs-primary: #10b981;
            --bs-primary-rgb: 16, 185, 129;
        }
        .btn-primary {
            background-color: var(--bs-primary) !important;
            border-color: var(--bs-primary) !important;
        }
        .text-primary {
            color: var(--bs-primary) !important;
        }
        .bg-primary {
            background-color: var(--bs-primary) !important;
        }
        .btn-outline-primary {
            color: var(--bs-primary) !important;
            border-color: var(--bs-primary) !important;
        }
        .btn-outline-primary:hover {
            background-color: var(--bs-primary) !important;
            color: white !important;
        }
        /* Extra fix for gradient inputs and focus rings */
        .form-control:focus, .form-select:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25) !important;
        }
    </style>
</head>


<body>
    <div class="login-card">
        <div class="card-header-section">
            <div class="logo-text"></i>JOB
                <span>MATCHING</span></div>
            <div class="tagline">AI Job Matching Platform</div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="num">10,000</div>
                    <div class="lbl">Learners</div>
                </div>
                <div class="stat-item">
                    <div class="num">3,000</div>
                    <div class="lbl">Job Posts</div>
                </div>

            </div>
        </div>
        <div class="card-body-section">
            <!-- Role Selector -->
            <div class="role-selector">
                <button class="role-btn active" id="btnCandidate" onclick="setRole('candidate')">
                    <i class="fas fa-user-tie me-2"></i>ฉันหางาน
                </button>
                <button class="role-btn" id="btnEmployer" onclick="setRole('employer')">
                    <i class="fas fa-building me-2"></i>ฉันหาคน
                </button>
            </div>
            <div>
                <div class="form-label-sm" id="idLabel">LEARNER ID</div>
                <input type="text" id="userId" class="form-input" placeholder="LNR-202600001" autocomplete="off">
            </div>
            <div id="hintCandidate" class="hint-bar mt-2">
                <div class="hint-title">เลือกตัวอย่าง USER</div>
                <span class="hint-pill" onclick="setId('LNR-202600007')">LNR-202600007</span>
                <span class="hint-pill" onclick="setId('LNR-202600002')">LNR-202600002</span>
                <span class="hint-pill" onclick="setId('LNR-202600003')">LNR-202600003</span>
                <span class="hint-pill" onclick="setId('LNR-202600010')">LNR-202600010</span>
            </div>
            <div id="hintEmployer" class="hint-bar mt-2" style="display:none;">
                <div class="hint-title">เลือกตัวอย่าง USER</div>
                <span class="hint-pill employer" onclick="setId('JOB-202600001')">JOB-202600001</span>
                <span class="hint-pill employer" onclick="setId('JOB-202600003')">JOB-202600003</span>
                <span class="hint-pill employer" onclick="setId('JOB-202600005')">JOB-202600005</span>
                <span class="hint-pill employer" onclick="setId('JOB-202600010')">JOB-202600010</span>
            </div>
            <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle me-2"></i><span
                    id="errorText">ข้อผิดพลาด</span></div>
            <div class="loading-state" id="loadingState"><span class="spinner-sm"></span><span
                    id="loadingText">กำลังเข้าสู่ระบบ...</span></div>
            <button class="btn-login" id="loginBtn" onclick="doLogin()">
                <i class="fas fa-sign-in-alt me-2"></i>เข้าสู่ระบบ
            </button>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5001';
        let currentRole = 'candidate';

        function setRole(role) {
            currentRole = role;
            const isCandidate = role === 'candidate';
            document.getElementById('btnCandidate').className = `role-btn${isCandidate ? ' active' : ''}`;
            document.getElementById('btnEmployer').className = `role-btn${!isCandidate ? ' active employer' : ''}`;
            document.getElementById('hintCandidate').style.display = isCandidate ? '' : 'none';
            document.getElementById('hintEmployer').style.display = isCandidate ? 'none' : '';
            document.getElementById('idLabel').textContent = isCandidate ? 'LEARNER ID' : 'JOB POST ID';
            document.getElementById('userId').placeholder = isCandidate ? 'LNR-202600001' : 'JOB-202600001';
            document.getElementById('loginBtn').className = `btn-login${isCandidate ? '' : ' employer'}`;
            hideError();
        }
        function setId(id) { document.getElementById('userId').value = id; hideError(); }
        function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
        function showError(msg) { document.getElementById('errorText').textContent = msg; document.getElementById('errorMsg').style.display = ''; }

        document.getElementById('userId').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const uid = document.getElementById('userId').value.trim();
            if (!uid) { showError('กรุณากรอก ID ก่อน'); return; }
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';
            hideError();

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: uid })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'ID ไม่ถูกต้อง');
                }
                const data = await res.json();
                localStorage.setItem('currentUser', JSON.stringify(data.data));

                if (data.role === 'employer') {
                    window.location.href = 'employer_dashboard.html';
                } else {
                    // Candidate: check profile completeness
                    if (data.profile_complete) {
                        document.getElementById('loadingText').textContent = 'โปรไฟล์ครบแล้ว กำลังเข้า Dashboard...';
                        window.location.href = 'candidate_dashboard.html';
                    } else {
                        document.getElementById('loadingText').textContent = 'กำลังไปที่หน้ากรอกข้อมูล...';
                        window.location.href = 'candidate_onboarding.html';
                    }
                }
            } catch (e) {
                document.getElementById('loginBtn').style.display = '';
                document.getElementById('loadingState').style.display = 'none';
                if (e.message === 'Failed to fetch') {
                    showError('ไม่สามารถเชื่อมต่อ API Server ได้ — กรุณา run: python api_server.py');
                } else {
                    showError(e.message);
                }
            }
        }
    </script>
</body>

</html>
